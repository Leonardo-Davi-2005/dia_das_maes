<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Dia das Mães</title>

    <!-- CSS (vamos criar depois) -->
    <link rel="stylesheet" href="style.css">
</head>

<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<body>

    <div class="hearts"></div>

    <!-- HEADER -->
    <header>
        <h1>Feliz Dia das Mães ❤️</h1>
        <h2 id="nome-mae">Para a melhor mãe do mundo</h2>
    </header>

    <!-- MENSAGEM -->
    <section id="mensagem">
        <p>
            Mãe, você é a pessoa mais importante da minha vida.
            Obrigado por tudo que você faz por mim todos os dias.
            Eu te amo muito!
        </p>
    </section>

    <!-- GALERIA -->
    <section id="galeria">
        <h3>Nossos momentos 📸</h3>

        <div class="fotos">
            <img src="Foto_1.jpeg" alt="Foto 1">
            <img src="Foto_2.jpeg" alt="Foto 2">
            <img src="Foto_3.jpeg" alt="Foto 3">
        </div>
    </section>

    <!-- SURPRESA -->
    <section id="surpresa-section">
        <button id="botao-surpresa">Clique para uma surpresa 💝</button>

        <p id="mensagem-surpresa"></p>
    </section>

    <!-- RODAPÉ -->
    <footer>
        <p>Feito com ❤️ por seu filho</p>
    </footer>

    <!-- JS (vamos criar depois) -->
    <script src="script.js"></script>

</body>

</html>
